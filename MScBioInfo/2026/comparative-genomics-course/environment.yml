name: convergent-evo
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  # Core scientific
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  # Jupyter
  - jupyter
  - jupytext
  # Bioinformatics
  - biopython
  - ete4>=4.4
  - mafft
  - trimal
  - fasttree
  - iqtree
  - clustalo
  # Visualization
  - pymol-open-source
  # Pip packages
  - pip
  - pip:
    - pymsaviz
